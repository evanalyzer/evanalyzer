[alias]
build-win       = ["xwin", "build", "--target", "x86_64-pc-windows-msvc",   "--release"]
build-win-arm   = ["xwin", "build", "--target", "aarch64-pc-windows-msvc",   "--release"]
build-linux     = ["build", "--target", "x86_64-unknown-linux-gnu",          "--release"]
build-linux-arm = ["build", "--target", "aarch64-unknown-linux-gnu",         "--release"]

# For Windows (MSVC) — statically linked CRT, lld linker
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-feature=+crt-static",
    "-L", "native=libs/win/libduckdb-windows-amd64",
]

# For Windows ARM64 (MSVC) — statically linked CRT
[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-L", "native=libs/win/libduckdb-windows-arm64",
]

# For Linux x86_64
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# For Linux ARM64 — requires aarch64-linux-gnu-gcc cross-toolchain
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]