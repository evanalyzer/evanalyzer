[package]
name = "evanalyzer_bin"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[dependencies]
evanalyzer_core = { path = "../core" }
evanalyzer_cfg = { path = "../cfg" }
evanalyzer_gui    = { path = "../gui" }
evanalyzer_cli    = { path = "../cli" }
evanalyzer_app    = { path = "../app" }
log = "0.4"
env_logger = "0.11"
clap = { version = "4", features = ["derive"] }

[[bin]]
name = "evanalyzer"
path = "src/main.rs"
